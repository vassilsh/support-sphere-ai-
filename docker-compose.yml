
services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_HOST=http://192.168.5.78:11434
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://192.168.5.150:3001
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
