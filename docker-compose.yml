
services:
  backend:
    build:
      context: ./backend
    expose:
      - "3001"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
